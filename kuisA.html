<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petualangan Misi Sains</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

@media screen and (max-width: 768px) {

    body {
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

    h2 {
        font-size: 18px;
    }

    h3 {
        font-size: 16px;
    }

    button {
        width: 100%;
        font-size: 14px;
        padding: 12px;
    }

    .status {
        font-size: 14px;
    }
}

.fade {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.benar {
    background-color: #d4edda !important;
    animation: flash 0.4s;
}

.salah {
    background-color: #f8d7da !important;
    animation: shake 0.4s;
}

@keyframes flash {
    0% {transform: scale(1);}
    50% {transform: scale(1.05);}
    100% {transform: scale(1);}
}

@keyframes shake {
    0% {transform: translateX(0);}
    25% {transform: translateX(-5px);}
    50% {transform: translateX(5px);}
    75% {transform: translateX(-5px);}
    100% {transform: translateX(0);}
}

button {
    margin: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #3498db;
    color: white;
    transition: 0.2s;
}

button:hover {
    background-color: #2c3e50;
}

.status {
    margin-bottom: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card fade" id="card">

<h1>Misi A: Agen Lingkungan</h1>

<div class="status">
❤️ Nyawa: <span id="nyawa">3</span> |
⭐ Skor: <span id="skor">0</span>
</div>

<h2 id="level"></h2>
<h3 id="soal"></h3>

<div id="jawaban"></div>
<br>
<button onclick="kembali()">Kembali ke Materi</button>
</div>

<script>

let nyawa = 3;
let skor = 0;
let skorLevel = 0;
let nomor = 0;
let level = 1;
let batasLulus = 20; // minimal 2 soal benar per level

let semuaLevel = {

1: [
{
soal: "Lingkungan adalah...",
pilihan: ["Tempat tinggal manusia saja", "Segala sesuatu di sekitar makhluk hidup yang memengaruhi kehidupannya", "Hanya benda mati di sekitar kita", "Hanya tumbuhan dan hewan"],
benar: 1
},
{
soal: "Berikut yang termasuk komponen abiotik adalah...",
pilihan: ["Air dan tumbuhan", "Hewan dan manusia", "Cahaya dan suhu", "Bakteri dan jamur"],
benar: 2
},
{
soal: "Cahaya Matahari sangat penting bagi tumbuhan karena digunakan untuk proses...",
pilihan: ["Respirasi", "Fotosintesis", "Transpirasi", "Adaptasi"],
benar: 1
}],
2: [
{
soal: "Hubungan antara pemangsa dan mangsa disebut...",
pilihan: ["Kompetisi", "Simbiosis", "Predasi", "Adaptasi"],
benar: 2
},
{
soal: "Percobaan pemberian pupuk berbeda pada tanaman menunjukkan bahwa...",
pilihan: ["Tanaman tidak dipengaruhi lingkungan", "Lingkungan memengaruhi pertumbuhan organisme", "Semua tanaman tumbuh sama", "Pupuk tidak berpengaruh"],
benar: 1
},
{
soal: "Tanaman tumbuh lambat di tanah dengan pH sangat rendah karena...",
pilihan: ["Air berlebih", "Nutrisi sulit diserap", "Cahaya terlalu banyak", "Suhu stabil"],
benar: 1
}],
3: [
{soal: "Jika suhu lingkungan terlalu tinggi, enzim pada organisme dapat...",
pilihan: ["Bekerja lebih cepat tanpa batas", "Rusak atau terdenaturasi", "Tidak terpengaruh", "Menghasilkan oksigen"],
benar: 1
},
{
soal: "Salinitas tinggi pada tanah dapat menyebabkan tanaman...",
pilihan: ["Tumbuh lebih cepat", "Kekurangan air secara fisiologis", "Menghasilkan lebih banyak bunga", "Tidak terpengaruh"],
benar: 1
},
{
soal: "Jika kelembapan udara sangat rendah, tumbuhan akan...",
pilihan: ["Mengurangi transpirasi", "Meningkatkan penguapan air", "Tidak melakukan fotosintesis", "Menyerap oksigen"],
benar: 1}
]
};

let pertanyaan = semuaLevel[level];
function tampilSoal() {

if (nomor >= pertanyaan.length) {

if (skorLevel >= batasLulus) {
level++;

if (semuaLevel[level]) {
alert("Asik Naik ke Level " + level + "!");
pertanyaan = semuaLevel[level];
nomor = 0;
skorLevel = 0; 
tampilSoal();
return;
} else {
document.getElementById("card").innerHTML =
"<h2>SELAMAT! SEMUA LEVEL SELESAI!</h2>" +
"<p>Total Skor Kamu: " + skor + "</p>" +
"<br>" +
"<button onclick='location.reload()'>Main Lagi</button>" +
"<br><br>" +
"<button onclick=\"window.location.href='materiA.html'\">Kembali ke Materi</button>";
return;
}
} else {
document.getElementById("card").innerHTML =
"<h2>Rekomendasi Belajar Ulang</h2>" +
"<p>Skor Level " + level + " kamu hanya " + skorLevel + 
" poin.</p>" +
"<p>Pelajari kembali materi sebelum melanjutkan ke level berikutnya.</p>" +
"<button onclick=\"window.location.href='materiA.html'\">Ulangi Materi</button>";
return;
}
}

document.getElementById("level").innerText =
"Level " + level;

document.getElementById("soal").innerText =
pertanyaan[nomor].soal;
let tombolJawaban = "";

for (let i = 0; i < pertanyaan[nomor].pilihan.length; i++) {
tombolJawaban +=
"<button onclick='cekJawaban(" + i + ")'>" +
pertanyaan[nomor].pilihan[i] +
"</button><br>";
}

document.getElementById("jawaban").innerHTML = tombolJawaban;
localStorage.setItem("skorMisiA", skor);
}

function kembali() {
if (confirm("Yakin ingin keluar?")) {
window.location.href = "materiA.html";
}
}

function cekJawaban(pilihanUser) {

let card = document.getElementById("card");

if (pilihanUser == pertanyaan[nomor].benar) {
skor += 10;
skorLevel += 10;
card.classList.add("benar");
} else {
nyawa--;
card.classList.add("salah");
}

document.getElementById("nyawa").innerText = nyawa;
document.getElementById("skor").innerText = skor;

setTimeout(() => {
card.classList.remove("benar");
card.classList.remove("salah");

if (nyawa == 0) {
card.innerHTML =
"<h2>GAME OVER!</h2>" +
"<button onclick='location.reload()'>Coba Lagi</button>";
return;
}

nomor++;
tampilSoal();

}, 500);
}

tampilSoal();

</script>
</body>
</html>
