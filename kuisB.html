<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petualangan Misi Sains</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

@media screen and (max-width: 768px) {

    body {
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

    h2 {
        font-size: 18px;
    }

    h3 {
        font-size: 16px;
    }

    button {
        width: 100%;
        font-size: 14px;
        padding: 12px;
    }

    .status {
        font-size: 14px;
    }
}

.fade {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.benar {
    background-color: #d4edda !important;
    animation: flash 0.4s;
}

.salah {
    background-color: #f8d7da !important;
    animation: shake 0.4s;
}

@keyframes flash {
    0% {transform: scale(1);}
    50% {transform: scale(1.05);}
    100% {transform: scale(1);}
}

@keyframes shake {
    0% {transform: translateX(0);}
    25% {transform: translateX(-5px);}
    50% {transform: translateX(5px);}
    75% {transform: translateX(-5px);}
    100% {transform: translateX(0);}
}

button {
    margin: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #3498db;
    color: white;
    transition: 0.2s;
}

button:hover {
    background-color: #2c3e50;
}

.status {
    margin-bottom: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card fade" id="card">

<h1>Misi B: Penjaga Ekosistem</h1>

<div class="status">
❤️ Nyawa: <span id="nyawa">3</span> |
⭐ Skor: <span id="skor">0</span>
</div>

<h2 id="level"></h2>
<h3 id="soal"></h3>

<div id="jawaban"></div>
<br>
<button onclick="kembali()">Kembali ke Materi</button>
</div>

<script>

let nyawa = 3;
let skor = 0;
let skorLevel = 0;
let nomor = 0;
let level = 1;
let batasLulus = 20; // minimal 2 soal benar per level

let semuaLevel = {

1: [
{
soal: "Ekosistem adalah...",
pilihan: ["Kumpulan hewan saja", "Hubungan antara manusia dan tumbuhan", "Interaksi makhluk hidup dengan lingkungan tak hidup", "Tempat tinggal hewan"],
benar: 2
},
{
soal: "Urutan tingkat organisasi kehidupan yang benar adalah...",
pilihan: ["Populasi – Individu – Komunitas", "Individu – Populasi – Komunitas – Ekosistem", "Ekosistem – Individu – Populasi", "Komunitas – Individu – Biosfer"],
benar: 1
},
{
soal: "Tempat hidup suatu makhluk hidup disebut...",
pilihan: ["Populasi", "Habitat", "Komunitas", "Bioma"],
benar: 1
}],
2: [
{
soal: "Dalam rantai makanan, tumbuhan berperan sebagai...",
pilihan: ["Konsumen", "Predator", "Produsen", "Dekomposer"],
benar: 2
},
{
soal: "Dalam suatu ekosistem, organisme yang berperan sebagai pengurai adalah...",
pilihan: ["Elang", "Rumput", "Jamur", "Kucing"],
benar: 2
},
{
soal: "Jika produsen berkurang drastis, maka konsumen tingkat I akan...",
pilihan: ["Bertambah", "Tetap stabil", "Berkurang", "Tidak terpengaruh"],
benar: 2
}],
3: [
{soal: "Jaring-jaring makanan lebih stabil daripada rantai makanan karena...",
pilihan: ["Lebih pendek", "Hanya satu jalur energi", "Memiliki banyak jalur energi", "Tidak melibatkan produsen"],
benar: 2
},
{
soal: "Jika predator puncak punah, ekosistem dapat menjadi tidak seimbang karena...",
pilihan: ["Tidak ada produsen", "Populasi mangsa melonjak", "Energi bertambah", "Suhu menurun"],
benar: 1
},
{
soal: "Herbivori termasuk interaksi...",
pilihan: ["Biotik–abiotik", "Abiotik–abiotik", "Biotik–biotik", "Abiotik–biotik"],
benar: 2}
]
};

let pertanyaan = semuaLevel[level];
function tampilSoal() {

if (nomor >= pertanyaan.length) {

if (skorLevel >= batasLulus) {
level++;

if (semuaLevel[level]) {
alert("Asik Naik ke Level " + level + "!");
pertanyaan = semuaLevel[level];
nomor = 0;
skorLevel = 0; 
tampilSoal();
return;
} else {
document.getElementById("card").innerHTML =
"<h2>SELAMAT! SEMUA LEVEL SELESAI!</h2>" +
"<p>Total Skor Kamu: " + skor + "</p>" +
"<br>" +
"<button onclick='location.reload()'>Main Lagi</button>" +
"<br><br>" +
"<button onclick=\"window.location.href='materiB.html'\">Kembali ke Materi</button>";
return;
}
} else {
document.getElementById("card").innerHTML =
"<h2>Rekomendasi Belajar Ulang</h2>" +
"<p>Skor Level " + level + " kamu hanya " + skorLevel + 
" poin.</p>" +
"<p>Pelajari kembali materi sebelum melanjutkan ke level berikutnya.</p>" +
"<button onclick=\"window.location.href='materiB.html'\">Ulangi Materi</button>";
return;
}
}

document.getElementById("level").innerText =
"Level " + level;

document.getElementById("soal").innerText =
pertanyaan[nomor].soal;
let tombolJawaban = "";

for (let i = 0; i < pertanyaan[nomor].pilihan.length; i++) {
tombolJawaban +=
"<button onclick='cekJawaban(" + i + ")'>" +
pertanyaan[nomor].pilihan[i] +
"</button><br>";
}

document.getElementById("jawaban").innerHTML = tombolJawaban;
localStorage.setItem("skorMisiB", skor);
}

function kembali() {
if (confirm("Yakin ingin keluar?")) {
window.location.href = "materiB.html";
}
}

function cekJawaban(pilihanUser) {

let card = document.getElementById("card");

if (pilihanUser == pertanyaan[nomor].benar) {
skor += 10;
skorLevel += 10;
card.classList.add("benar");
} else {
nyawa--;
card.classList.add("salah");
}

document.getElementById("nyawa").innerText = nyawa;
document.getElementById("skor").innerText = skor;

setTimeout(() => {
card.classList.remove("benar");
card.classList.remove("salah");

if (nyawa == 0) {
card.innerHTML =
"<h2>GAME OVER!</h2>" +
"<button onclick='location.reload()'>Coba Lagi</button>";
return;
}

nomor++;
tampilSoal();

}, 500);
}

tampilSoal();

</script>
</body>
</html>
