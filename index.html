<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART SCIENCE</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#home {
    text-align: center;
}

h1 {
    color: #2c3e50;
}

.halaman {
    display: none;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

@media screen and (max-width: 768px) {

    body {
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

    h2 {
        font-size: 18px;
    }

    h3 {
        font-size: 16px;
    }

    button {
        width: 100%;
        font-size: 14px;
        padding: 12px;
    }

    .status {
        font-size: 14px;
    }
}

.card:hover {
    transform: translateY(-5px);
}

button {
    background-color: #3498db;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background-color: #2c3e50;
}
</style>
</head>

    <h1 align="center">SMART SCIENCE</h1>
